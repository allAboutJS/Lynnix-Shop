<header
  class="bg-zinc-50 border-b border-b-zinc-300 sticky top-0 left-0 w-full"
>
  <div class="max-w-7xl mx-auto p-6 flex justify-between">
    <div class="text-xl font-bold"><a href="/">Lynnix Shop</a></div>

    <nav>
      <ul class="flex gap-4">
        <li>
          <a href="/cart"
            >Cart (<span
              id="cart-count"
              hx-get="/cart/count"
              hx-trigger="cart-updated from:body"
              hx-swap="innerHTML"
              >{{ data.cartCount }}</span
            >)</a
          >
        </li>
      </ul>
    </nav>
  </div>
</header>
